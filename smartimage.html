<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagem Responsiva</title>
  <style>
    /* Torna a imagem responsiva */
    .responsive-image {
      width: 100%; /* A largura será ajustada ao tamanho do contêiner */
      height: auto; /* Mantém a proporção da imagem */
      max-width: 500px; /* Define um limite máximo de largura */
    }
  </style>
</head>
<body>
  <h1>Exemplo de Imagem Responsiva</h1>
  <img src="capa.png" alt="Imagem Responsiva" class="responsive-image">
</body>
</html>
