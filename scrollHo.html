<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Scroll</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            border: 1px solid #fff;
        }
        .scroll-container::-webkit-scrollbar {
            height: 3px; /* Altura da barra de rolagem */
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1; /* Cor do trilho da barra de rolagem */
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #888; /* Cor do polegar da barra de rolagem */
            border-radius: 4px; /* Bordas arredondadas do polegar */
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #555; /* Cor do polegar da barra de rolagem ao passar o mouse */
        }
        .scroll-item {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            background-color: #f0f0f0;
            margin-right: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 20px;
            border-radius: 100px;
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="scroll-item"><i class="fas fa-home"></i></div>
        <div class="scroll-item"><i class="fas fa-user"></i></div>
        <div class="scroll-item"><i class="fas fa-cog"></i></div>
        <div class="scroll-item"><i class="fas fa-envelope"></i></div>
        <div class="scroll-item"><i class="fas fa-bell"></i></div>
    </div>
</body>
</html>
