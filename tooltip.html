<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip com HTML e CSS</title>
  <style>
    /* Estilo do container do tooltip */
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    /* Estilo do texto do tooltip */
    .tooltip .tooltip-text {
      visibility: hidden;
      width: 150px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 5px;
      padding: 5px;
      position: absolute;
      bottom: 125%; /* Posiciona acima do elemento */
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Triângulo do tooltip */
    .tooltip .tooltip-text::after {
      content: '';
      position: absolute;
      top: 100%; /* Posiciona abaixo do tooltip */
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px;
      border-style: solid;
      border-color: #333 transparent transparent transparent;
    }

    /* Exibir o tooltip ao passar o mouse */
    .tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="tooltip" style="margin-top: 150px;">
    Passe o mouse aqui
    <span class="tooltip-text">Este é o tooltip!</span>
  </div>
</body>
</html>
