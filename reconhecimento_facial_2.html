<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reconhecimento Facial - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .video-wrapper {
            position: relative;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #667eea;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-register {
            background: #48bb78;
        }

        .btn-clear {
            background: #f56565;
        }

        .status {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #4a5568;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }

        .status.warning {
            background: #feebc8;
            color: #7c4a0e;
        }

        .registered-faces {
            background: #edf2f7;
            padding: 15px;
            border-radius: 10px;
        }

        .registered-faces h3 {
            margin-bottom: 10px;
            color: #4a5568;
            font-size: 14px;
        }

        .face-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .face-tag {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Reconhecimento Facial</h1>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button id="btnRegister" class="btn-register">📸 Registrar Rosto</button>
            <button id="btnRecognize" class="btn-register" style="background: #4299e1;">🔍 Reconhecer</button>
            <button id="btnClear" class="btn-clear">🗑️ Limpar Registros</button>
        </div>

        <div id="status" class="status info">
            ⏳ Carregando modelos...
        </div>

        <div class="registered-faces">
            <h3>👥 Rostos Registrados:</h3>
            <div id="faceList" class="face-list">
                <span style="color: #a0aec0;">Nenhum rosto registrado</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let context = canvas.getContext('2d');
        let modelsLoaded = false;
        let registeredFaces = [];
        
        let statusDiv = document.getElementById('status');
        let faceListDiv = document.getElementById('faceList');
        let btnRegister = document.getElementById('btnRegister');
        let btnRecognize = document.getElementById('btnRecognize');
        let btnClear = document.getElementById('btnClear');

        // Verificar se está em HTTPS
        function checkSecurity() {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && !location.hostname.startsWith('127.')) {
                updateStatus('⚠️ ATENÇÃO: Este app precisa de HTTPS para funcionar no celular! Veja as instruções abaixo.', 'warning');
                showSecurityInstructions();
                return false;
            }
            return true;
        }

        function showSecurityInstructions() {
            const instructions = `
                <div style="margin-top: 10px; font-size: 12px; text-align: left;">
                    <strong>Soluções:</strong><br>
                    1. Use um servidor HTTPS (ngrok, serveo)<br>
                    2. Acesse via localhost no PC<br>
                    3. No Chrome Android, digite: chrome://flags/#unsafely-treat-insecure-origin-as-secure<br>
                    &nbsp;&nbsp; Adicione seu endereço e ative<br>
                    <br>
                    <strong>Método mais fácil:</strong><br>
                    • Baixe o app "HTTP Server" na Play Store<br>
                    • Ative a opção HTTPS nele
                </div>
            `;
            statusDiv.innerHTML += instructions;
        }

        async function loadModels() {
            try {
                updateStatus('📥 Baixando modelos de IA... (pode levar alguns segundos)', 'info');
                
                const modelUrl = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
                    faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl),
                    faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl)
                ]);
                
                modelsLoaded = true;
                updateStatus('✅ Modelos carregados! Aguardando câmera...', 'success');
                startCamera();
            } catch (error) {
                console.error('Erro ao carregar modelos:', error);
                updateStatus('❌ Erro ao carregar modelos. Verifique sua internet.', 'error');
            }
        }

        async function startCamera() {
            try {
                // Verificar suporte do navegador
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    updateStatus('❌ Seu navegador não suporta acesso à câmera', 'error');
                    return;
                }

                updateStatus('📷 Solicitando permissão da câmera...', 'info');
                
                const constraints = {
                    video: {
                        facingMode: { exact: 'user' } // Tenta câmera frontal primeiro
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    updateStatus('📷 Câmera ativa! Posicione seu rosto na tela', 'success');
                    startFaceDetection();
                };
                
            } catch (error) {
                console.error('Erro detalhado:', error);
                
                // Tentar com facingMode padrão (sem exigir 'user')
                if (error.name === 'OverconstrainedError') {
                    try {
                        updateStatus('📷 Tentando com configuração padrão...', 'info');
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            updateStatus('📷 Câmera ativa!', 'success');
                            startFaceDetection();
                        };
                        return;
                    } catch (secondError) {
                        console.error('Segunda tentativa falhou:', secondError);
                    }
                }
                
                let errorMessage = '❌ Não foi possível acessar a câmera. ';
                
                if (error.name === 'NotAllowedError') {
                    errorMessage += 'Permissão negada. Clique no ícone de cadeado na barra de endereço e permita o acesso à câmera.';
                } else if (error.name === 'NotFoundError') {
                    errorMessage += 'Nenhuma câmera encontrada no dispositivo.';
                } else if (error.name === 'NotReadableError') {
                    errorMessage += 'Câmera está sendo usada por outro aplicativo.';
                } else {
                    errorMessage += `Erro: ${error.message}`;
                }
                
                updateStatus(errorMessage, 'error');
                
                // Instruções específicas para Android
                if (/android/i.test(navigator.userAgent)) {
                    statusDiv.innerHTML += `
                        <div style="margin-top: 10px; font-size: 12px; text-align: left;">
                            <strong>🔧 Solução para Android:</strong><br>
                            1. Feche e reabra o navegador<br>
                            2. Vá em Configurações > Apps > Chrome > Permissões<br>
                            3. Ative a permissão de câmera<br>
                            4. Recarregue a página<br>
                            <br>
                            <strong>⚠️ Importante:</strong> Este app precisa de HTTPS!<br>
                            Use um servidor seguro como ngrok ou serveo.
                        </div>
                    `;
                }
            }
        }

        function startFaceDetection() {
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            setInterval(async () => {
                if (!modelsLoaded || video.paused || video.ended || video.readyState !== 4) return;
                
                try {
                    const detections = await faceapi.detectAllFaces(
                        video, 
                        new faceapi.TinyFaceDetectorOptions()
                    ).withFaceLandmarks().withFaceDescriptors();
                    
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                    faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                    
                    if (registeredFaces.length > 0 && detections.length > 0) {
                        await autoRecognize(detections);
                    }
                    
                } catch (error) {
                    console.error('Erro na detecção:', error);
                }
            }, 100);
        }

        async function autoRecognize(detections) {
            for (const detection of detections) {
                let bestMatch = null;
                let bestDistance = 0.6;
                
                for (const registered of registeredFaces) {
                    const distance = faceapi.euclideanDistance(
                        detection.descriptor,
                        registered.descriptor
                    );
                    
                    if (distance < bestDistance) {
                        bestDistance = distance;
                        bestMatch = registered;
                    }
                }
                
                if (bestMatch) {
                    const box = detection.detection.box;
                    context.font = "20px Arial";
                    context.fillStyle = "#48bb78";
                    context.fillText(bestMatch.name, box.x, box.y - 5);
                    context.strokeStyle = "#48bb78";
                    context.lineWidth = 3;
                    context.strokeRect(box.x, box.y, box.width, box.height);
                }
            }
        }

        async function registerFace() {
            if (!modelsLoaded) {
                updateStatus('⏳ Aguarde os modelos carregarem...', 'info');
                return;
            }
            
            updateStatus('📸 Detectando rosto...', 'info');
            
            try {
                const detection = await faceapi.detectSingleFace(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks().withFaceDescriptor();
                
                if (!detection) {
                    updateStatus('❌ Nenhum rosto detectado! Posicione-se corretamente.', 'error');
                    return;
                }
                
                const name = `Pessoa ${registeredFaces.length + 1}`;
                registeredFaces.push({
                    name: name,
                    descriptor: detection.descriptor
                });
                
                updateFaceList();
                updateStatus(`✅ ${name} registrado com sucesso!`, 'success');
                
            } catch (error) {
                console.error('Erro ao registrar:', error);
                updateStatus('❌ Erro ao registrar rosto. Tente novamente.', 'error');
            }
        }

        async function recognizeFace() {
            if (!modelsLoaded) {
                updateStatus('⏳ Aguarde os modelos carregarem...', 'info');
                return;
            }
            
            if (registeredFaces.length === 0) {
                updateStatus('⚠️ Nenhum rosto registrado! Cadastre alguém primeiro.', 'info');
                return;
            }
            
            updateStatus('🔍 Reconhecendo rosto...', 'info');
            
            try {
                const detection = await faceapi.detectSingleFace(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks().withFaceDescriptor();
                
                if (!detection) {
                    updateStatus('❌ Nenhum rosto detectado!', 'error');
                    return;
                }
                
                let bestMatch = null;
                let bestDistance = 0.6;
                
                for (const registered of registeredFaces) {
                    const distance = faceapi.euclideanDistance(
                        detection.descriptor,
                        registered.descriptor
                    );
                    
                    if (distance < bestDistance) {
                        bestDistance = distance;
                        bestMatch = registered;
                    }
                }
                
                if (bestMatch) {
                    const confidence = Math.round((1 - bestDistance) * 100);
                    updateStatus(`✅ Reconhecido: ${bestMatch.name} (${confidence}% de confiança)`, 'success');
                } else {
                    updateStatus('❌ Rosto não reconhecido! Tente registrar este rosto primeiro.', 'error');
                }
                
            } catch (error) {
                console.error('Erro ao reconhecer:', error);
                updateStatus('❌ Erro ao reconhecer. Tente novamente.', 'error');
            }
        }

        function clearFaces() {
            registeredFaces = [];
            updateFaceList();
            updateStatus('🗑️ Todos os rostos foram removidos!', 'info');
        }

        function updateFaceList() {
            if (registeredFaces.length === 0) {
                faceListDiv.innerHTML = '<span style="color: #a0aec0;">Nenhum rosto registrado</span>';
                return;
            }
            
            faceListDiv.innerHTML = registeredFaces.map(face => 
                `<div class="face-tag">${face.name}</div>`
            ).join('');
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        btnRegister.addEventListener('click', registerFace);
        btnRecognize.addEventListener('click', recognizeFace);
        btnClear.addEventListener('click', clearFaces);

        // Iniciar
        checkSecurity();
        loadModels();
    </script>
</body>
</html>
