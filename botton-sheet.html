<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottom Sheet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Estilo do botão */
    .open-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Container do Bottom Sheet */
    .bottom-sheet {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 300px;
      background-color: #f9f9f9;
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.2);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      transition: bottom 0.3s ease-in-out;
    }

    /* Cabeçalho do Bottom Sheet */
    .bottom-sheet-header {
      padding: 10px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    /* Conteúdo do Bottom Sheet */
    .bottom-sheet-content {
      padding: 20px;
      text-align: center;
    }

    /* Classe para mostrar o Bottom Sheet */
    .bottom-sheet.active {
      bottom: 0;
    }
  </style>
</head>
<body>
  <button class="open-btn" onclick="toggleBottomSheet()">Abrir Bottom Sheet</button>

  <div class="bottom-sheet" id="bottomSheet">
    <div class="bottom-sheet-header">
      Arraste para fechar
    </div>
    <div class="bottom-sheet-content">
      <p>Este é o conteúdo do Bottom Sheet.</p>
      <button onclick="toggleBottomSheet()">Fechar</button>
    </div>
  </div>

  <script>
    function toggleBottomSheet() {
      const bottomSheet = document.getElementById('bottomSheet');
      bottomSheet.classList.toggle('active');
    }
  </script>
</body>
</html>
