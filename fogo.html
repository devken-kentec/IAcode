<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Fire Effect</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="doom-fire"></canvas>
    <script>
        const canvas = document.getElementById('doom-fire');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fireWidth = Math.floor(canvas.width / 4);
        const fireHeight = Math.floor(canvas.height / 4);
        const firePixelsArray = new Array(fireWidth * fireHeight).fill(0);
        const fireColorsPalette = generateFireColorsPalette();

        function generateFireColorsPalette() {
            const palette = [];
            for (let i = 0; i < 256; i++) {
                const red = i < 128 ? i * 2 : 255;
                const green = i < 128 ? 0 : (i - 128) * 2;
                const blue = 0;
                palette.push(`rgb(${red},${green},${blue})`);
            }
            return palette;
        }

        function createFireSource() {
            for (let x = 0; x < fireWidth; x++) {
                const overflowPixelIndex = fireWidth * fireHeight;
                const pixelIndex = (overflowPixelIndex - fireWidth) + x;
                firePixelsArray[pixelIndex] = 255;
            }
        }

        function calculateFirePropagation() {
            for (let x = 0; x < fireWidth; x++) {
                for (let y = 0; y < fireHeight; y++) {
                    const pixelIndex = x + (fireWidth * y);
                    updateFireIntensityPerPixel(pixelIndex);
                }
            }
            renderFire();
        }

        function updateFireIntensityPerPixel(currentPixelIndex) {
            const belowPixelIndex = currentPixelIndex + fireWidth;
            if (belowPixelIndex >= fireWidth * fireHeight) {
                return;
            }
            const decay = Math.floor(Math.random() * 3);
            const belowPixelFireIntensity = firePixelsArray[belowPixelIndex];
            const newFireIntensity = belowPixelFireIntensity - decay >= 0 ? belowPixelFireIntensity - decay : 0;
            firePixelsArray[currentPixelIndex - decay] = newFireIntensity;
        }

        function renderFire() {
            const imageData = ctx.createImageData(fireWidth, fireHeight);
            for (let i = 0; i < firePixelsArray.length; i++) {
                const fireIntensity = firePixelsArray[i];
                const color = fireColorsPalette[fireIntensity];
                const [r, g, b] = color.match(/\d+/g).map(Number);
                const pixelIndex = i * 4;
                imageData.data[pixelIndex] = r;
                imageData.data[pixelIndex + 1] = g;
                imageData.data[pixelIndex + 2] = b;
                imageData.data[pixelIndex + 3] = 255;
            }
            ctx.putImageData(imageData, 0, 0, 0, 0, canvas.width, canvas.height);
        }

        function start() {
            createFireSource();
            setInterval(calculateFirePropagation, 50);
        }

        start();
    </script>
</body>
</html>
