<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar UUID</title>
</head>
<body>
    <h1>Gerador de UUID</h1>
    <button id="generate">Gerar UUID</button>
    <ul id="uuidList"></ul>

    <script>
        // Função para gerar UUID v4
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        document.getElementById('generate').addEventListener('click', () => {
            const uuidList = document.getElementById('uuidList');
            uuidList.innerHTML = ''; // Limpa a lista anterior

            // Gera 10 UUIDs e adiciona à lista
            for (let i = 0; i < 100; i++) {
                const li = document.createElement('li');
                li.textContent = generateUUID();
                uuidList.appendChild(li);
            }
        });
    </script>
</body>
</html>
