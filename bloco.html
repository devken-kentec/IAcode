<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco Azul</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .blue-block {
            background-color: #FFA07A;
            width: 100%;
            height: 100%;
            position: absolute;
            animation: fillAndDisappear 5s alternate-reverse;
        }
        @keyframes fillAndDisappear {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            50% {
                width: 100%;
                height: 100%;
                opacity: 1;
            }
            100% {
                width: 100%;
                height: 100%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="blue-block"></div>
</body>
</html>
