<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Simples</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
        }
        
        #gameCanvas {
            border: 3px solid #333;
            background-color: #87CEEB;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="info">Use as setas para mover | Pontos: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Jogador (Mario)
        const mario = {
            x: 50,
            y: 300,
            width: 30,
            height: 40,
            velocityY: 0,
            velocityX: 0,
            speed: 5,
            jumpPower: -16,
            grounded: false,
            color: '#FF0000' // Vermelho para o Mario
        };

        // Plataformas
        const platforms = [
            { x: 0, y: 340, width: 800, height: 60 }, // Chão
            { x: 200, y: 280, width: 150, height: 20 },
            { x: 500, y: 220, width: 150, height: 20 },
            { x: 300, y: 160, width: 100, height: 20 }
        ];

        // Moedas
        let coins = [
            { x: 250, y: 250, width: 20, height: 20, collected: false },
            { x: 550, y: 190, width: 20, height: 20, collected: false },
            { x: 350, y: 130, width: 20, height: 20, collected: false },
            { x: 100, y: 310, width: 20, height: 20, collected: false }
        ];

        let score = 0;
        let keys = {};

        // Controles
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function checkPlatformCollision() {
            mario.grounded = false;
            
            for (let platform of platforms) {
                if (checkCollision(mario, platform)) {
                    // Colisão por cima
                    if (mario.velocityY >= 0 && mario.y + mario.height > platform.y && 
                        mario.y < platform.y && mario.y + mario.height - mario.velocityY <= platform.y) {
                        mario.y = platform.y - mario.height;
                        mario.velocityY = 0;
                        mario.grounded = true;
                    }
                    // Colisão por baixo
                    else if (mario.velocityY < 0 && mario.y < platform.y + platform.height) {
                        mario.y = platform.y + platform.height;
                        mario.velocityY = 0;
                    }
                }
            }
        }

        function checkCoinCollision() {
            for (let coin of coins) {
                if (!coin.collected && checkCollision(mario, coin)) {
                    coin.collected = true;
                    score += 10;
                    scoreElement.textContent = score;
                }
            }
        }

        function update() {
            // Movimento horizontal
            if (keys['ArrowLeft']) {
                mario.velocityX = -mario.speed;
            } else if (keys['ArrowRight']) {
                mario.velocityX = mario.speed;
            } else {
                mario.velocityX *= 0.8; // Desaceleração
            }

            // Pulo
            if (keys['ArrowUp'] && mario.grounded) {
                mario.velocityY = mario.jumpPower;
                mario.grounded = false;
            }

            // Aplicar gravidade
            mario.velocityY += 0.8; // Gravidade
            mario.y += mario.velocityY;
            mario.x += mario.velocityX;

            // Limites da tela
            if (mario.x < 0) mario.x = 0;
            if (mario.x + mario.width > canvas.width) mario.x = canvas.width - mario.width;
            
            // Chão de segurança (se cair)
            if (mario.y > canvas.height) {
                mario.y = 300;
                mario.velocityY = 0;
                score = 0;
                scoreElement.textContent = score;
                // Resetar moedas
                coins.forEach(coin => coin.collected = false);
            }

            checkPlatformCollision();
            checkCoinCollision();
        }

        function draw() {
            // Limpar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar céu
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar plataformas
            ctx.fillStyle = '#8B4513'; // Marrom
            for (let platform of platforms) {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                // Borda verde (como nos jogos do Mario)
                ctx.fillStyle = '#228B22';
                ctx.fillRect(platform.x, platform.y, platform.width, 5);
                ctx.fillStyle = '#8B4513';
            }

            // Desenhar moedas
            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = '#FFD700'; // Dourado
                    ctx.beginPath();
                    ctx.arc(coin.x + 10, coin.y + 10, 10, 0, Math.PI * 2);
                    ctx.fill();
                    // Brilho
                    ctx.fillStyle = '#FFF';
                    ctx.beginPath();
                    ctx.arc(coin.x + 6, coin.y + 6, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Desenhar Mario
            // Chapéu
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(mario.x + 5, mario.y - 5, 20, 10);
            
            // Corpo
            ctx.fillStyle = mario.color;
            ctx.fillRect(mario.x, mario.y, mario.width, mario.height);
            
            // Olhos
            ctx.fillStyle = '#FFF';
            ctx.fillRect(mario.x + 5, mario.y + 8, 5, 5);
            ctx.fillRect(mario.x + 18, mario.y + 8, 5, 5);
            
            // Bigode
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(mario.x + 2, mario.y + 15, 8, 3);
            ctx.fillRect(mario.x + 18, mario.y + 15, 8, 3);
            
            // Macacão
            ctx.fillStyle = '#0000FF';
            ctx.fillRect(mario.x, mario.y + 25, mario.width, 10);

            // Informações adicionais
            ctx.fillStyle = '#000';
            ctx.font = '16px Arial';
            ctx.fillText('Mario Simples', 10, 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
